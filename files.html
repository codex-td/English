<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>EduDown | Grade-wise File Hub</title>
  <!-- Google Fonts + Font Awesome Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 30%, rgba(255, 255, 255, 0.95), rgba(72, 253, 178, 0.98));
      background-attachment: fixed;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(2px);
    }

    /* main glass container */
    .glass-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      padding: 2rem 1.8rem;
      transition: all 0.3s ease;
    }

    /* header area */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header h1 {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #00ffaa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 5px rgba(133, 133, 133, 0.2);
    }
    .header p {
      color: rgba(82, 255, 183, 0.8);
      margin-top: 0.5rem;
      font-weight: 400;
      font-size: 1rem;
    }
    .badge {
      background: rgba(48, 255, 203, 0.445);
      display: inline-block;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      margin-top: 0.8rem;
      backdrop-filter: blur(4px);
    }

    /* grade selector grid */
    .grade-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2.8rem;
      background: rgba(0, 0, 0, 0.2);
      padding: 1rem 1.2rem;
      border-radius: 3rem;
      backdrop-filter: blur(4px);
    }
    .grade-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #f0f3fa;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .grade-btn i {
      margin-right: 6px;
      font-size: 0.8rem;
    }
    .grade-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      border-color: rgba(255,255,240,0.6);
    }
    .grade-btn.active {
      background: linear-gradient(120deg, #3bf664, #04ffb4);
      border-color: white;
      color: white;
      box-shadow: 0 8px 18px rgba(59, 246, 106, 0.4);
    }

    /* file section */
    .file-section {
      margin-top: 0.5rem;
    }
    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      border-left: 4px solid #5cf6d0;
      padding-left: 1rem;
    }
    .section-title h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #000000;
      letter-spacing: -0.2px;
    }
    .section-title span {
      background: rgba(0,0,0,0.4);
      padding: 0.3rem 0.9rem;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #010504;
    }

    /* file cards grid - responsive */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    /* glass file card */
    .file-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 1.6rem;
      border: 1px solid rgb(0, 0, 0);
      padding: 1.2rem 1.2rem 1.2rem 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.3);
    }
    .file-card:hover {
      transform: translateY(-4px);
      background: rgba(90, 252, 171, 0.7);
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.4);
    }
    .file-info {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex: 2;
    }
    .file-icon {
      font-size: 2.2rem;
      color: #a5fce2;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .file-details h4 {
      font-size: 1.05rem;
      font-weight: 600;
      color: rgb(0, 0, 0);
      word-break: break-word;
    }
    .file-details p {
      font-size: 0.7rem;
      color: #0b1018;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .download-btn {
      background: rgba(123, 248, 190, 0.521);
      backdrop-filter: blur(5px);
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 2.2rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,240,0.3);
    }
    .download-btn i {
      font-size: 0.9rem;
    }
    .download-btn:hover {
      background: #3bf6ae;
      border-color: white;
      transform: scale(0.97);
      box-shadow: 0 4px 12px rgba(59, 246, 168, 0.5);
    }
    .empty-message {
      text-align: center;
      padding: 3rem;
      background: rgba(0,0,0,0.2);
      border-radius: 2rem;
      color: #cddae9;
      backdrop-filter: blur(8px);
    }
    .empty-message i {
      font-size: 3rem;
      margin-bottom: 0.8rem;
      opacity: 0.7;
    }

    /* footer */
    .footer-note {
      margin-top: 2.8rem;
      text-align: center;
      font-size: 0.75rem;
      color: #6e6e6e;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1.5rem;
    }

    /* responsive fine-tune */
    @media (max-width: 680px) {
      body {
        padding: 1rem;
      }
      .glass-container {
        padding: 1.2rem;
      }
      .grade-btn {
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
      }
      .grade-grid {
        gap: 0.5rem;
      }
      .file-card {
        flex-direction: row;
        align-items: center;
      }
      .section-title h2 {
        font-size: 1.3rem;
      }
    }
    @media (max-width: 480px) {
      .file-info {
        gap: 0.7rem;
      }
      .download-btn {
        padding: 0.4rem 1rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
<div class="glass-container">
  <div class="header">
    <h1><i class="fas fa-graduation-cap"></i> Download Files</h1>
    <p>Select your grade & download educational resources instantly</p>
    <div class="badge"><i class="fas fa-database"></i> Grade 1 to 13</div>
  </div>

  <!-- Dynamic grade buttons 1-13 -->
  <div class="grade-grid" id="gradeButtonsContainer"></div>

  <!-- File listing area -->
  <div class="file-section">
    <div class="section-title">
      <h2><i class="fas fa-file-alt"></i> Available Files</h2>
      <span id="gradeDisplayBadge">Grade —</span>
    </div>
    <div id="filesListContainer">
      <!-- files will be injected dynamically -->
      <div class="empty-message">
        <i class="fas fa-cloud-arrow-up"></i>
        <p>Select a grade to view downloadable files</p>
      </div>
    </div>
  </div>
  <div class="footer-note">
    <i class="fas fa-download"></i> Click on any download button to get your file • Glassmorphism design
  </div>
</div>

<script>
  // -------------------- MOCK DATABASE : Gradewise files (1 to 13) --------------------
  // each grade has an array of file objects: name, size, type, downloadUrl (simulated)
  // For demonstration, we generate meaningful educational sample files per grade.
  // Real usage can replace downloadUrl with actual backend endpoints or blob links.
  
  const generateFilesForGrade = (grade) => {
    // Base subjects / file patterns per stage
    const primarySubjects = ["English", "English2"];
    const lowerSecondary = ["English3",];
    const upperSecondary = ["English4", "English5"];
    const olSubjects = ["English6", "English7", "English8"];
    const alSubjects = ["English9", "English10", "English11", "English12"];
    
    let subjects = [];
    if (grade <= 5) subjects = primarySubjects;
    else if (grade >= 6 && grade <= 9) subjects = lowerSecondary;
    else if (grade === 10 || grade === 11) subjects = olSubjects;
    else subjects = alSubjects;
    
    // Each grade gets 3-5 files based on subjects + extra specific
    let files = [];
    const fileTypes = [".pdf", ".docx", ".pptx", ".zip"];
    const sizes = ["1.2 MB", "2.5 MB", "850 KB", "4.1 MB", "3.7 MB", "980 KB"];
    
    // ensure variety, at least 3 files, maximum 6 files
    let numberOfFiles = Math.min(subjects.length, 5);
    if (grade === 1) numberOfFiles = 3;
    if (grade === 13) numberOfFiles = 6;
    if (grade === 7) numberOfFiles = 4;
    
    for (let i = 0; i < numberOfFiles; i++) {
      let subjectBase = subjects[i % subjects.length];
      let ext = fileTypes[i % fileTypes.length];
      let fileName = `Grade_${grade}_${subjectBase}${ext}`;
      let fileSize = sizes[i % sizes.length];
      // Simulate download URL using data URI or blob? For actual demo, we use a dummy blob text file? 
      // But to make downloading realistic: create a blob with some text content describing the file.
      // This way every download works out-of-the-box with real file generation.
      // However, better to provide real downloadable .pdf simulation? We will generate .txt/.pdf simulated download.
      // To give sense, we generate downloadable content that matches file name.
      let downloadHandler = () => {
        // Create a blob with informative content + grade details, so user gets a realistic file.
        let content = `This is a simulated educational resource.\nGrade: ${grade}\nSubject: ${subjectBase}\nFile Type: ${ext}\n\nOyta Mathakata Platform - Demo file for grade ${grade}. Replace with actual PDF/notes.`;
        let blob = new Blob([content], { type: "application/octet-stream" });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };
      
      files.push({
        id: `${grade}-${i}`,
        name: fileName,
        size: fileSize,
        type: ext.replace('.', '').toUpperCase(),
        downloadFn: downloadHandler,
        originalSubject: subjectBase
      });
    }
    // Special case for Grade 12/13 add more depth
    if (grade === 12) {
      files.push({
        id: `12-special`,
        name: `Grade_12_Advanced_Level_Resource_Pack.zip`,
        size: "7.8 MB",
        type: "ZIP",
        downloadFn: () => {
          let blob = new Blob(["AL Resource pack simulation content for grade 12"], {type: "application/zip"});
          let url = URL.createObjectURL(blob);
          let a = document.createElement("a");
          a.href = url;
          a.download = "Grade_12_Advanced_Resource_Pack.zip";
          a.click();
          URL.revokeObjectURL(url);
        }
      });
    }
    if (grade === 13) {
      files.push({
        id: `13-exam`,
        name: `Grade_13_Model_Papers_2025.pdf`,
        size: "5.2 MB",
        type: "PDF",
        downloadFn: () => {
          let blob = new Blob(["Model examination papers for Advanced Level - Grade 13"], {type: "application/pdf"});
          let url = URL.createObjectURL(blob);
          let a = document.createElement("a");
          a.href = url;
          a.download = "Grade_13_Model_Papers_2025.pdf";
          a.click();
          URL.revokeObjectURL(url);
        }
      });
    }
    return files;
  };
  
  // full files database object: grade -> array of files
  const gradeFilesDB = {};
  for (let g = 1; g <= 13; g++) {
    gradeFilesDB[g] = generateFilesForGrade(g);
  }
  
  // current active grade
  let currentGrade = null;
  
  // DOM elements
  const gradeButtonsContainer = document.getElementById("gradeButtonsContainer");
  const filesListContainer = document.getElementById("filesListContainer");
  const gradeDisplayBadge = document.getElementById("gradeDisplayBadge");
  
  // function to render grade buttons (1-13)
  function renderGradeButtons() {
    for (let i = 1; i <= 13; i++) {
      const btn = document.createElement("button");
      btn.className = "grade-btn";
      btn.innerHTML = `<i class="fas fa-layer-group"></i> Grade ${i}`;
      btn.addEventListener("click", () => {
        // set active grade
        setActiveGrade(i);
      });
      gradeButtonsContainer.appendChild(btn);
    }
    // optionally set default grade 1 active
    setActiveGrade(1);
  }
  
  // set active grade UI + load files
  function setActiveGrade(grade) {
    currentGrade = grade;
    // update active style on buttons
    const allBtns = document.querySelectorAll(".grade-btn");
    allBtns.forEach((btn, idx) => {
      if (idx + 1 === grade) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
    // update badge
    gradeDisplayBadge.innerHTML = `<i class="fas fa-star-of-life"></i> Grade ${grade} • ${gradeFilesDB[grade].length} files`;
    // render file list for this grade
    renderFilesForGrade(grade);
  }
  
  // render files using glass card style
  function renderFilesForGrade(grade) {
    const files = gradeFilesDB[grade] || [];
    if (files.length === 0) {
      filesListContainer.innerHTML = `
        <div class="empty-message">
          <i class="fas fa-folder-open"></i>
          <p>No files available for Grade ${grade} currently.<br>Check back later!</p>
        </div>
      `;
      return;
    }
    
    // create grid container
    const gridDiv = document.createElement("div");
    gridDiv.className = "files-grid";
    
    files.forEach(file => {
      const card = document.createElement("div");
      card.className = "file-card";
      
      // choose icon based on file type
      let fileIcon = "fa-file-pdf";
      let iconColor = "#f87171";
      if (file.type === "DOCX") fileIcon = "fa-file-word", iconColor = "#60a5fa";
      else if (file.type === "ZIP") fileIcon = "fa-file-zipper", iconColor = "#fbbf24";
      else if (file.type === "PPTX") fileIcon = "fa-file-powerpoint", iconColor = "#f97316";
      else if (file.type === "PDF") fileIcon = "fa-file-pdf", iconColor = "#ef4444";
      else fileIcon = "fa-file-lines", iconColor = "#94a3b8";
      
      card.innerHTML = `
        <div class="file-info">
          <div class="file-icon" style="color: ${iconColor};">
            <i class="fas ${fileIcon}"></i>
          </div>
          <div class="file-details">
            <h4>${escapeHtml(file.name)}</h4>
            <p><i class="fas fa-hdd"></i> ${file.size}  <i class="fas fa-tag"></i> ${file.type}</p>
          </div>
        </div>
        <button class="download-btn" data-file-id="${file.id}">
          <i class="fas fa-download"></i> Download
        </button>
      `;
      
      // attach download event
      const downloadBtn = card.querySelector(".download-btn");
      downloadBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        // execute the download function from our mock database
        if (file.downloadFn && typeof file.downloadFn === "function") {
          file.downloadFn();
          // optional: visual feedback
          const originalText = downloadBtn.innerHTML;
          downloadBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Starting...';
          setTimeout(() => {
            downloadBtn.innerHTML = originalText;
          }, 800);
        } else {
          // fallback blob same as name
          let fallbackBlob = new Blob([`Fallback content for ${file.name}`], {type: "text/plain"});
          let url = URL.createObjectURL(fallbackBlob);
          let a = document.createElement("a");
          a.href = url;
          a.download = file.name;
          a.click();
          URL.revokeObjectURL(url);
        }
      });
      
      gridDiv.appendChild(card);
    });
    
    // clear container and append new grid
    filesListContainer.innerHTML = "";
    filesListContainer.appendChild(gridDiv);
  }
  
  // simple escape helper
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // additional responsive observer for glass effect consistency
  renderGradeButtons();
  
  // optional: add dynamic resize / no extra steps, but everything is fluid.
  // plus interactive download simulation.
  // Also we ensure any screen (mobile/tablet/desktop) looks clean.
</script>
</body>
</html>
