<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SkillNest Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="image/icon.png" type="image/x-icon">
    <link rel="icon" href="image/icon.png" sizes="32*32">
    <link rel="icon" href="image/icon.png" sizes="48*48">
    <link rel="icon" href="image/icon.png" sizes="96*96">
    <link rel="icon" href="image/icon.png" sizes="144*144">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a3a, #2c5a4a, #1a8a6a);
            padding: 30px 20px;
            position: relative;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 24px;
            transition: all 0.2s ease;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        h1 i {
            background: rgba(0, 255, 157, 0.8);
            padding: 12px;
            border-radius: 50%;
            color: #1e2a3a;
        }
        .section-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .admin-card {
            background: rgba(61, 255, 181, 0.212);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px 28px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.89);
            color: white;
            font-weight: 600;
        }
        .admin-card i {
            font-size: 2.8rem;
            margin-bottom: 12px;
            display: block;
        }
        .admin-card:hover {
            background: rgba(5, 243, 172, 0.829);
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: rgba(30,40,50,0.95);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
            color: #f0f0f0;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            color: rgb(255, 255, 255);
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: #a0f0d0;
        }
        input, select, textarea {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 24px;
            padding: 10px 16px;
            color: rgb(0, 0, 0);
            font-size: 0.9rem;
            outline: none;
        }
        input::placeholder {
            color: #000000;
        }
        input:focus, select:focus, textarea:focus {
            background: rgba(255,255,255,0.25);
            border-color: #05ff97;
        }
        button {
            background: #56ff9d;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e2a3a;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 12px;
            transition: 0.2s;
        }
        button:hover {
            background: #3dd485;
            transform: translateY(-2px);
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        button.danger {
            background: #ff4757;
            color: white;
        }
        button.delete-btn {
            background: #ffa502;
            color: white;
        }
        button.secondary {
            background: #747d8c;
            color: white;
        }
        .grade-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }
        .grade-chip {
            background: rgba(36, 255, 127, 0.7);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .grade-chip:hover {
            background: #05ff97;
            transform: scale(1.05);
        }
        .student-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .student-table th, .student-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.486);
            text-align: left;
        }
        .student-table th {
            background: rgba(0, 255, 157, 0.3);
        }
        .student-row.already-marked {
            background: rgba(128, 128, 128, 0.3);
            opacity: 0.7;
        }
        .student-row.already-marked td:first-child {
            border-left: 4px solid #f39c12;
        }
        .present-btn, .absent-btn {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin: 0 4px;
            cursor: pointer;
        }
        .present-btn {
            background: #2ecc71;
            color: white;
        }
        .absent-btn {
            background: #e74c3c;
            color: white;
        }
        .present-btn:disabled, .absent-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
            opacity: 0.5;
        }
        .mark-input {
            width: 80px;
            background: rgba(255,255,255,0.3);
        }
        .payment-month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .month-option {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            text-align: center;
            border-radius: 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .month-option:hover {
            background: rgba(255,255,255,0.4);
        }
        .month-option.paid {
            background: #2ecc71;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .month-option.selected {
            background: #12f35d;
            transform: scale(1.02);
        }
        .loader-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: white;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #05ff97;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .toast-msg {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c503c;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2100;
            backdrop-filter: blur(8px);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .flex-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .back-link {
            margin-left: auto;
        }
        .back-link a {
            color: white;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .back-link a:hover {
            background: rgba(255,255,255,0.4);
        }
        .id-status {
            margin-top: 5px;
            font-size: 0.8rem;
        }
        .id-available {
            color: #2ecc71;
        }
        .id-taken {
            color: #e74c3c;
        }
        .id-checking {
            color: #f39c12;
        }
        .attendance-summary {
            background: rgba(0, 255, 157, 0.2);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .warning-message {
            background: rgba(243, 156, 18, 0.3);
            border-left: 4px solid #f39c12;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .already-marked-badge {
            background: #f39c12;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        .skill-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .skill-table th, .skill-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.486);
            text-align: left;
        }
        @media (max-width: 700px) {
            .admin-card { width: 140px; padding: 12px; }
            .modal-content { padding: 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="loader-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-size: 24px; font-weight: bold;">Admin Dashboard loading...</div>
    <div>Syncing with Google Sheets...</div>
</div>

<div class="main-container">
    <h1>
        <i class="fas fa-chalkboard-user"></i> Admin - Data Entry
        
    </h1>
    <div class="section-grid">
        <div class="admin-card" data-section="register"><i class="fas fa-user-plus"></i><br>Registration</div>
        <div class="admin-card" data-section="update"><i class="fas fa-edit"></i><br>Update Student</div>
        <div class="admin-card" data-section="attend"><i class="fas fa-calendar-check"></i><br>Attendance</div>
        <div class="admin-card" data-section="exam"><i class="fas fa-chart-line"></i><br>Exam Marks</div>
        <div class="admin-card" data-section="skill"><i class="fas fa-language"></i><br>Skills Update</div>
        <div class="admin-card" data-section="payment"><i class="fas fa-coins"></i><br>Payments</div>
    </div>
</div>

<div id="dynamicModal" class="modal"><div id="modalInner"></div></div>

<script>
    // ==================== GOOGLE SHEETS CONFIGURATION ====================
    // REPLACE THIS URL with your deployed Google Apps Script Web App URL
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXgn5HueVEIlKsD6UZZApZvZmpyAeqX9IGkV3697Wwcx5VfSwjwCtAK6JhyZSRhieM/exec";
    
    // Helper Functions
    function showLoader(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
    
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#e74c3c' : '#2ecc71';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Main API Call Function
    async function callGSheet(action, method = 'GET', payload = {}) {
        showLoader(true);
        try {
            const url = new URL(GOOGLE_SCRIPT_URL);
            if (method === 'GET') {
                url.searchParams.append('action', action);
                for (let [k, v] of Object.entries(payload)) {
                    if (v !== undefined && v !== null) url.searchParams.append(k, v);
                }
                const resp = await fetch(url.toString());
                const data = await resp.json();
                showLoader(false);
                return data;
            } else {
                const formData = new URLSearchParams();
                formData.append('action', action);
                formData.append('data', JSON.stringify(payload));
                
                const resp = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                const data = await resp.json();
                showLoader(false);
                return data;
            }
        } catch (err) {
            showLoader(false);
            console.error("API Error:", err);
            showToast("Network error: " + err.message, true);
            return { error: true, message: err.message };
        }
    }
    
    // ==================== API FUNCTIONS ====================
    
    async function checkDuplicateId(id) {
        if (!id || id.trim() === '') {
            return { exists: false };
        }
        const result = await callGSheet('checkDuplicateId', 'GET', { id: id.trim().toUpperCase() });
        return result;
    }
    
    async function registerStudent(data) {
        data.id = data.id.trim().toUpperCase();
        
        const duplicateCheck = await checkDuplicateId(data.id);
        if (duplicateCheck.exists) {
            showToast("❌ Student ID '" + data.id + "' already exists! Please use a different ID.", true);
            return false;
        }
        
        const result = await callGSheet('registerStudent', 'POST', data);
        if (result.success) {
            showToast("✅ Student registered successfully!");
            return true;
        } else {
            showToast(result.error || "Registration failed!", true);
            return false;
        }
    }
    
    async function updateStudent(id, updatedData) {
        const payload = { id, ...updatedData };
        const result = await callGSheet('updateStudent', 'POST', payload);
        if (result.success) {
            showToast("✅ Student data updated!");
            return true;
        } else {
            showToast(result.error || "Update failed!", true);
            return false;
        }
    }
    
    async function deleteStudent(id) {
        if (!confirm("Are you sure you want to delete this student permanently? This action cannot be undone!")) {
            return false;
        }
        const result = await callGSheet('deleteStudent', 'POST', { id });
        if (result.success) {
            showToast("✅ Student deleted successfully!");
            return true;
        } else {
            showToast(result.error || "Delete failed!", true);
            return false;
        }
    }
    
    async function getStudentsByGrade(grade) {
        const result = await callGSheet('getAllStudentsByGrade', 'GET', { grade });
        if (result.success && result.data) {
            return result.data;
        }
        return [];
    }
    
    // NEW: Get today's attendance for a grade
    async function getTodayAttendanceForGrade(grade, date) {
        const result = await callGSheet('getTodayAttendanceByGrade', 'GET', { grade, date });
        if (result.success && result.data) {
            return result.data;
        }
        return [];
    }
    
    async function saveAttendance(grade, date, records) {
        const result = await callGSheet('saveAttendance', 'POST', { grade, date, records });
        if (result.success) {
            showToast("✅ Attendance saved to Google Sheets!");
            return true;
        } else {
            showToast(result.error || "Attendance save failed!", true);
            return false;
        }
    }
    
    async function saveExamMarks(grade, date, marks) {
        const result = await callGSheet('saveExamMarks', 'POST', { grade, date, marks });
        if (result.success) {
            showToast("✅ Exam marks saved to Google Sheets!");
            return true;
        } else {
            showToast(result.error || "Exam marks save failed!", true);
            return false;
        }
    }
    
    async function saveSkill(data) {
        const result = await callGSheet('saveSkill', 'POST', data);
        if (result.success) {
            showToast("✅ Skills updated successfully!");
            return true;
        } else {
            showToast(result.error || "Skill update failed!", true);
            return false;
        }
    }
    
    async function savePayment(id, month, year) {
        const payload = { id, month, year, timestamp: new Date().toISOString() };
        const result = await callGSheet('savePayment', 'POST', payload);
        if (result.success) {
            showToast(`✅ Payment for ${month} ${year} recorded!`);
            return true;
        } else {
            showToast(result.error || "Payment failed!", true);
            return false;
        }
    }
    
    async function getPaidMonthsForStudent(studentId) {
        const result = await callGSheet('getPayments', 'GET', { id: studentId });
        if (result.success && result.data) {
            return result.data.map(p => p.month);
        }
        return [];
    }
    
    async function promoteAllGrades() {
        if (!confirm("Promote all students to next grade? Grade 13 students will remain in Grade 13. This action cannot be undone.")) {
            return false;
        }
        const result = await callGSheet('promoteGrades', 'POST', {});
        if (result.success) {
            showToast("✅ All students promoted to next grade!");
            return true;
        } else {
            showToast(result.error || "Promotion failed!", true);
            return false;
        }
    }
    
    async function getStudentById(id) {
        const result = await callGSheet('getStudentData', 'GET', { id: id.trim().toUpperCase() });
        if (result.success && result.data) {
            return result.data;
        }
        return null;
    }
    
    // ==================== UI RENDERING FUNCTIONS ====================
    
    const modalDiv = document.getElementById('dynamicModal');
    
    function openModal(htmlContent, closeCallback) {
        document.getElementById('modalInner').innerHTML = htmlContent;
        modalDiv.style.display = 'flex';
        const closeBtns = document.querySelectorAll('.close-modal');
        closeBtns.forEach(btn => btn.addEventListener('click', () => { 
            modalDiv.style.display = 'none'; 
            if(closeCallback) closeCallback(); 
        }));
    }
    
    function generateFormFields(data = {}, isRegistration = true) {
        const fields = [
            { name: 'id', label: 'Student ID', type: 'text', required: true, placeholder: 'e.g., S001' },
            { name: 'password', label: 'Password', type: 'text', required: true, placeholder: 'Enter password' },
            { name: 'name', label: 'Full Name', type: 'text', required: true, placeholder: 'e.g., John Doe' },
            { name: 'grade', label: 'Grade (1-13)', type: 'number', min: 1, max: 13, required: true },
            { name: 'phone', label: 'Phone Number', type: 'tel', required: true, placeholder: 'e.g., 0771234567' },
            { name: 'gender', label: 'Gender', type: 'select', options: ['Male', 'Female', 'Other'] },
            { name: 'address', label: 'Address', type: 'textarea', placeholder: 'Enter address' },
            { name: 'parentInf', label: 'Parent Information', type: 'text', placeholder: 'e.g., Parent name & contact' },
            { name: 'birth', label: 'Birth Date', type: 'date' }
        ];
        
        return fields.map(field => {
            if (field.type === 'select') {
                const options = field.options.map(opt => 
                    `<option value="${opt}" ${data[field.name] === opt ? 'selected' : ''}>${opt}</option>`
                ).join('');
                return `
                    <div class="form-group">
                        <label>${field.label} ${field.required ? '*' : ''}</label>
                        <select name="${field.name}" ${field.required ? 'required' : ''}>
                            <option value="">Select ${field.label}</option>
                            ${options}
                        </select>
                    </div>
                `;
            } else if (field.type === 'textarea') {
                return `
                    <div class="form-group">
                        <label>${field.label}</label>
                        <textarea name="${field.name}" rows="2" placeholder="${field.placeholder || ''}">${data[field.name] || ''}</textarea>
                    </div>
                `;
            } else {
                if (field.name === 'id' && isRegistration) {
                    return `
                        <div class="form-group">
                            <label>${field.label} ${field.required ? '*' : ''}</label>
                            <input type="${field.type}" name="${field.name}" id="studentIdInput" 
                                   value="${data[field.name] || ''}" placeholder="${field.placeholder || ''}"
                                   ${field.min ? `min="${field.min}"` : ''} ${field.max ? `max="${field.max}"` : ''}
                                   ${field.required ? 'required' : ''} style="text-transform: uppercase;">
                            <div class="id-status" id="idStatus"></div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="form-group">
                            <label>${field.label} ${field.required ? '*' : ''}</label>
                            <input type="${field.type}" name="${field.name}" 
                                   value="${data[field.name] || ''}" placeholder="${field.placeholder || ''}"
                                   ${field.min ? `min="${field.min}"` : ''} ${field.max ? `max="${field.max}"` : ''}
                                   ${field.required ? 'required' : ''} ${field.name === 'id' && data.id ? 'readonly' : ''}
                                   ${field.name === 'id' ? 'style="text-transform: uppercase;"' : ''}>
                        </div>
                    `;
                }
            }
        }).join('');
    }
    
    let idCheckTimeout = null;
    function setupIdValidation() {
        const idInput = document.getElementById('studentIdInput');
        const idStatus = document.getElementById('idStatus');
        
        if (!idInput || !idStatus) return;
        
        idInput.addEventListener('input', function() {
            const id = this.value.trim().toUpperCase();
            this.value = id;
            
            if (idCheckTimeout) clearTimeout(idCheckTimeout);
            
            if (id === '') {
                idStatus.innerHTML = '';
                idStatus.className = 'id-status';
                return;
            }
            
            const idPattern = /^S\d{3,}$/;
            if (!idPattern.test(id)) {
                idStatus.innerHTML = '⚠️ ID should start with "S" followed by at least 3 digits (e.g., S001)';
                idStatus.className = 'id-status id-taken';
                return;
            }
            
            idStatus.innerHTML = '🔄 Checking ID availability...';
            idStatus.className = 'id-status id-checking';
            
            idCheckTimeout = setTimeout(async () => {
                const result = await checkDuplicateId(id);
                if (result.exists) {
                    idStatus.innerHTML = '❌ This ID is already taken! Please choose another.';
                    idStatus.className = 'id-status id-taken';
                } else {
                    idStatus.innerHTML = '✅ ID is available!';
                    idStatus.className = 'id-status id-available';
                }
            }, 500);
        });
    }
    
    function showRegisterUI() {
        openModal(`
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-user-graduate"></i> Student Registration</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="regForm">
                    ${generateFormFields({}, true)}
                    <div class="flex-row">
                        <button type="submit"><i class="fas fa-save"></i> Register Student</button>
                        <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Cancel</button>
                    </div>
                </form>
            </div>
        `);
        
        setupIdValidation();
        
        document.getElementById('regForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const idInput = document.getElementById('studentIdInput');
            const id = idInput.value.trim().toUpperCase();
            const duplicateCheck = await checkDuplicateId(id);
            
            if (duplicateCheck.exists) {
                showToast("❌ Student ID '" + id + "' is already taken! Please use a different ID.", true);
                return;
            }
            
            let formData = new FormData(e.target);
            let student = {};
            for (let [k, v] of formData.entries()) student[k] = v;
            student.id = student.id.trim().toUpperCase();
            
            const success = await registerStudent(student);
            if (success) {
                modalDiv.style.display = 'none';
            }
        });
    }
    
    function showUpdateUI() {
        openModal(`
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-edit"></i> Update/Delete Student</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="form-group">
                    <label>Enter Student ID</label>
                    <input type="text" id="updateStudentId" placeholder="e.g., S001" style="text-transform: uppercase;">
                </div>
                <button id="fetchStudentBtn"><i class="fas fa-search"></i> Fetch Student Data</button>
                <div id="updateFormContainer"></div>
                <div class="flex-row" style="margin-top: 20px;">
                    <button id="promoteGradesBtn" style="background:#f39c12;"><i class="fas fa-arrow-up"></i> Promote All Grades</button>
                    <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Close</button>
                </div>
            </div>
        `);
        
        document.getElementById('fetchStudentBtn').addEventListener('click', async () => {
            let id = document.getElementById('updateStudentId').value.trim().toUpperCase();
            if (!id) {
                showToast("Please enter Student ID", true);
                return;
            }
            
            showLoader(true);
            let student = await getStudentById(id);
            showLoader(false);
            
            if (!student) {
                showToast("❌ Student ID '" + id + "' not found in Google Sheets!", true);
                return;
            }
            
            let formHtml = `
                <form id="updateForm">
                    ${generateFormFields(student, false)}
                    <div class="flex-row">
                        <button type="submit"><i class="fas fa-save"></i> Update Student</button>
                        <button type="button" id="deleteStudentBtn" class="delete-btn"><i class="fas fa-trash"></i> Delete Student</button>
                    </div>
                </form>
            `;
            document.getElementById('updateFormContainer').innerHTML = formHtml;
            
            document.getElementById('updateForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                let fd = new FormData(e.target);
                let upd = {};
                for (let [k, v] of fd.entries()) upd[k] = v;
                const success = await updateStudent(id, upd);
                if (success) {
                    modalDiv.style.display = 'none';
                }
            });
            
            document.getElementById('deleteStudentBtn')?.addEventListener('click', async () => {
                const success = await deleteStudent(id);
                if (success) {
                    modalDiv.style.display = 'none';
                }
            });
        });
        
        document.getElementById('updateStudentId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('fetchStudentBtn').click();
            }
        });
        
        document.getElementById('promoteGradesBtn')?.addEventListener('click', async () => {
            await promoteAllGrades();
            modalDiv.style.display = 'none';
        });
    }
    
    function renderGradeCards(callback) {
        let grades = Array.from({ length: 13 }, (_, i) => i + 1);
        let html = `
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-layer-group"></i> Select Grade</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="grade-cards">
                    ${grades.map(g => `<div class="grade-chip" data-grade="${g}">Grade ${g}</div>`).join('')}
                </div>
                <div id="gradeDetailArea"></div>
            </div>
        `;
        openModal(html);
        document.querySelectorAll('.grade-chip').forEach(chip => {
            chip.addEventListener('click', () => callback(chip.dataset.grade));
        });
    }
    
    // ==================== FIXED ATTENDANCE UI ====================
    async function showAttendUI() {
        renderGradeCards(async (grade) => {
            showLoader(true);
            let students = await getStudentsByGrade(grade);
            let today = new Date().toISOString().slice(0, 10);
            
            // Get today's already marked attendance
            let todayAttendance = await getTodayAttendanceForGrade(grade, today);
            let markedIds = new Set(todayAttendance.map(a => a.id));
            let markedStatus = {};
            todayAttendance.forEach(a => {
                markedStatus[a.id] = a.status;
            });
            
            showLoader(false);
            
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange; padding:20px; text-align:center;">No students found in Grade ${grade}</p>`;
                return;
            }
            
            // Count already marked
            const markedCount = todayAttendance.length;
            const totalCount = students.length;
            
            let tableRows = students.map(s => {
                const isMarked = markedIds.has(s.id);
                const existingStatus = markedStatus[s.id] || '';
                
                return `
                    <tr class="student-row ${isMarked ? 'already-marked' : ''}" id="row-${s.id}">
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>
                            ${isMarked ? 
                                `<span style="color: ${existingStatus === 'Present' ? '#2ecc71' : '#e74c3c'}; font-weight: bold;">
                                    ✓ ${existingStatus} 
                                </span>
                                <span class="already-marked-badge">Already Marked</span>` : 
                                `<button class="present-btn" data-id="${s.id}" data-status="Present">✓ Present</button>
                                <button class="absent-btn" data-id="${s.id}" data-status="Absent">✗ Absent</button>
                                <span class="status-indicator" id="status-${s.id}"></span>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
            
            let html = `
                <div>
                    <h3><i class="fas fa-calendar"></i> Grade ${grade} Attendance - ${today}</h3>
                    
                    <div class="attendance-summary">
                        <i class="fas fa-info-circle"></i> 
                        <strong>Marked:</strong> ${markedCount} / ${totalCount} students
                        ${markedCount > 0 ? '<br><span style="color: #f39c12;">⚠️ Already marked students cannot be changed today.</span>' : ''}
                    </div>
                    
                    ${markedCount > 0 ? `
                        <div class="warning-message">
                            <i class="fas fa-exclamation-triangle"></i>
                            <strong>Important:</strong> Students highlighted in gray have already been marked today. 
                            You cannot mark them again until tomorrow!
                        </div>
                    ` : ''}
                    
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Mark Attendance</th></tr>
                        ${tableRows}
                    </table>
                    <div class="flex-row" style="margin-top:20px;">
                        <button id="saveAttendBtn"><i class="fas fa-save"></i> Save New Attendance</button>
                        <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Cancel</button>
                    </div>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            let attendanceMap = {};
            
            // Only attach listeners to unmarked students
            document.querySelectorAll('.present-btn, .absent-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let id = btn.dataset.id;
                    let status = btn.dataset.status;
                    
                    // Check if already marked (double-check)
                    if (markedIds.has(id)) {
                        showToast(`⚠️ Student ${id} has already been marked today! Cannot change.`, true);
                        return;
                    }
                    
                    attendanceMap[id] = status;
                    document.getElementById(`status-${id}`).innerHTML = ` ← Will be marked ${status}`;
                    document.getElementById(`status-${id}`).style.color = status === 'Present' ? '#2ecc71' : '#e74c3c';
                    
                    // Visual feedback
                    document.querySelectorAll(`[data-id="${id}"]`).forEach(b => {
                        b.style.opacity = '0.5';
                    });
                    btn.style.opacity = '1';
                    btn.style.transform = 'scale(1.05)';
                });
            });
            
            document.getElementById('saveAttendBtn')?.addEventListener('click', async () => {
                let records = Object.entries(attendanceMap).map(([id, status]) => ({ id, status }));
                
                // Filter out any that might have been marked already (extra safety)
                records = records.filter(r => !markedIds.has(r.id));
                
                if (records.length === 0) {
                    showToast("No new attendance marked! Please mark at least one student.", true);
                    return;
                }
                
                // Confirm before saving
                const confirmMsg = `Save attendance for ${records.length} student(s)?`;
                if (!confirm(confirmMsg)) {
                    return;
                }
                
                const success = await saveAttendance(grade, today, records);
                if (success) {
                    modalDiv.style.display = 'none';
                }
            });
        });
    }
    
    async function showExamUI() {
        renderGradeCards(async (grade) => {
            showLoader(true);
            let students = await getStudentsByGrade(grade);
            showLoader(false);
            
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange; padding:20px; text-align:center;">No students found in Grade ${grade}</p>`;
                return;
            }
            let examDate = prompt("Enter exam date (YYYY-MM-DD):", new Date().toISOString().slice(0, 10)) || new Date().toISOString().slice(0, 10);
            let rows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td><input type="number" class="mark-input" data-id="${s.id}" placeholder="0-100" min="0" max="100"></td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3><i class="fas fa-file-alt"></i> Exam Marks - Grade ${grade} (${examDate})</h3>
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Mark (0-100)</th></tr>
                        ${rows}
                    </table>
                    <div class="flex-row" style="margin-top:20px;">
                        <button id="saveExamBtn"><i class="fas fa-save"></i> Save Marks</button>
                        <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Cancel</button>
                    </div>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            document.getElementById('saveExamBtn')?.addEventListener('click', async () => {
                let marks = [];
                document.querySelectorAll('.mark-input').forEach(inp => {
                    let id = inp.dataset.id;
                    let mark = inp.value;
                    if (mark !== '' && !isNaN(mark) && mark >= 0 && mark <= 100) {
                        marks.push({ id, mark: parseInt(mark) });
                    }
                });
                if (marks.length === 0) {
                    showToast("No valid marks entered!", true);
                    return;
                }
                const success = await saveExamMarks(grade, examDate, marks);
                if (success) {
                    modalDiv.style.display = 'none';
                }
            });
        });
    }
    
    async function showSkillUI() {
        renderGradeCards(async (grade) => {
            showLoader(true);
            let students = await getStudentsByGrade(grade);
            showLoader(false);
            
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange; padding:20px; text-align:center;">No students found in Grade ${grade}</p>`;
                return;
            }
            let rows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td><input class="skill-input" data-id="${s.id}" data-skill="grammar" placeholder="0-100" type="number" min="0" max="100"></td>
                    <td><input class="skill-input" data-id="${s.id}" data-skill="writing" placeholder="0-100" type="number" min="0" max="100"></td>
                    <td><input class="skill-input" data-id="${s.id}" data-skill="reading" placeholder="0-100" type="number" min="0" max="100"></td>
                    <td><input class="skill-input" data-id="${s.id}" data-skill="spoken" placeholder="0-100" type="number" min="0" max="100"></td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3><i class="fas fa-chart-bar"></i> Skill Update - Grade ${grade}</h3>
                    <table class="skill-table">
                        <tr><th>ID</th><th>Name</th><th>Grammar</th><th>Writing</th><th>Reading</th><th>Spoken</th></tr>
                        ${rows}
                    </table>
                    <div class="flex-row" style="margin-top:20px;">
                        <button id="saveAllSkillsBtn"><i class="fas fa-save"></i> Save All Skills</button>
                        <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Close</button>
                    </div>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            document.getElementById('saveAllSkillsBtn')?.addEventListener('click', async () => {
                const skillData = {};
                document.querySelectorAll('.skill-input').forEach(inp => {
                    const id = inp.dataset.id;
                    const skill = inp.dataset.skill;
                    const value = inp.value;
                    
                    if (value !== '' && !isNaN(value) && value >= 0 && value <= 100) {
                        if (!skillData[id]) {
                            skillData[id] = { id, grammar: '0', writing: '0', reading: '0', spoken: '0' };
                        }
                        skillData[id][skill] = value;
                    }
                });
                
                let successCount = 0;
                for (let id in skillData) {
                    const success = await saveSkill(skillData[id]);
                    if (success) successCount++;
                }
                
                if (successCount > 0) {
                    showToast(`✅ Saved skills for ${successCount} student(s)!`);
                    modalDiv.style.display = 'none';
                } else {
                    showToast("No valid skills entered!", true);
                }
            });
        });
    }
    
    async function showPaymentUI() {
        renderGradeCards(async (grade) => {
            showLoader(true);
            let students = await getStudentsByGrade(grade);
            showLoader(false);
            
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange; padding:20px; text-align:center;">No students found in Grade ${grade}</p>`;
                return;
            }
            let rows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td><button class="payBtn" data-id="${s.id}" data-name="${s.name}"><i class="fas fa-money-bill"></i> Mark Payment</button></td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3><i class="fas fa-coins"></i> Payments - Grade ${grade}</h3>
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Action</th></tr>
                        ${rows}
                    </table>
                    <div class="flex-row" style="margin-top:20px;">
                        <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Close</button>
                    </div>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            document.querySelectorAll('.payBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    let sid = btn.dataset.id;
                    let sname = btn.dataset.name;
                    showLoader(true);
                    let paidMonths = await getPaidMonthsForStudent(sid);
                    showLoader(false);
                    
                    let months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    let currentYear = new Date().getFullYear();
                    let monthGrid = `
                        <div class="payment-month-grid">
                            ${months.map(m => `<div class="month-option ${paidMonths.includes(m) ? 'paid' : ''}" data-month="${m}">${m}</div>`).join('')}
                        </div>
                        <p style="margin:10px 0;">Selected: <span id="selectedMonthDisplay" style="color:#05ff97;">None</span></p>
                        <div class="flex-row">
                            <button id="confirmPayment"><i class="fas fa-check"></i> Confirm Payment</button>
                            <button type="button" class="close-modal secondary"><i class="fas fa-times"></i> Cancel</button>
                        </div>
                    `;
                    
                    openModal(`
                        <div class="modal-content">
                            <h3><i class="fas fa-user"></i> Select Month for ${sname} (${sid})</h3>
                            <p>Year: ${currentYear} | Amount: LKR 1,000</p>
                            ${monthGrid}
                        </div>
                    `);
                    
                    let selected = null;
                    document.querySelectorAll('.month-option').forEach(opt => {
                        if (!opt.classList.contains('paid')) {
                            opt.addEventListener('click', () => {
                                selected = opt.dataset.month;
                                document.querySelectorAll('.month-option').forEach(o => o.classList.remove('selected'));
                                opt.classList.add('selected');
                                document.getElementById('selectedMonthDisplay').textContent = selected;
                            });
                        }
                    });
                    
                    document.getElementById('confirmPayment')?.addEventListener('click', async () => {
                        if (selected && !paidMonths.includes(selected)) {
                            const success = await savePayment(sid, selected, currentYear);
                            if (success) {
                                modalDiv.style.display = 'none';
                                document.querySelector('#dynamicModal .close-modal')?.click();
                            }
                        } else {
                            showToast("Please select a valid unpaid month!", true);
                        }
                    });
                });
            });
        });
    }
    
    // Event Listeners
    document.querySelectorAll('.admin-card').forEach(card => {
        card.addEventListener('click', () => {
            const section = card.dataset.section;
            if (section === 'register') showRegisterUI();
            else if (section === 'update') showUpdateUI();
            else if (section === 'attend') showAttendUI();
            else if (section === 'exam') showExamUI();
            else if (section === 'skill') showSkillUI();
            else if (section === 'payment') showPaymentUI();
        });
    });
    
    modalDiv.addEventListener('click', (e) => {
        if (e.target === modalDiv) {
            modalDiv.style.display = 'none';
        }
    });
    
    console.log("✅ Admin Panel Ready - Duplicate attendance prevention is active!");
</script>
