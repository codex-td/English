<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EduManager Pro - Student Admin Panel | Google Sheets Sync</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
       <link rel="shortcut icon" href="image/icon.png" type="image/x-icon">
    <link rel="icon" href="image/icon.png" sizes="32*32">
    <link rel="icon" href="image/icon.png" sizes="48*48">
    <link rel="icon" href="image/icon.png sizes="96*96">
    <link rel="icon" href="image/icon.png" sizes="144*144">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f0f0, #5fffb470, #00ffaa);
            padding: 30px 20px;
            position: relative;
        }
        .glass-panel {
            background: rgba(87, 245, 158, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgb(0, 0, 0);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            padding: 24px;
            transition: all 0.2s ease;
        }
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        h1 i {
            background: rgba(0, 255, 157, 0.8);
            padding: 12px;
            border-radius: 50%;
            color: #1e2a3a;
        }
        .section-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }
        .admin-card {
            background: rgba(61, 255, 181, 0.212);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px 28px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.89);
            color: white;
            font-weight: 600;
        }
        .admin-card i {
            font-size: 2.8rem;
            margin-bottom: 12px;
            display: block;
        }
        .admin-card:hover {
            background: rgba(5, 243, 172, 0.829);
            transform: translateY(-6px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.3);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
        }
        .modal-content {
            background: rgba(30,40,50,0.95);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
            color: #f0f0f0;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            color: white;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        input, select, textarea {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 24px;
            padding: 10px 16px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }
        input::placeholder {
            color: #ddd;
        }
        button {
            background: #56ff9d;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: bold;
            color: #1e2a3a;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 12px;
            transition: 0.2s;
        }
        button.danger {
            background: #ff0000ee;
        }
        button.delete-btn {
            background: #36343386;
        }
        .grade-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }
        .grade-chip {
            background: rgba(36, 255, 127, 0.7);
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .student-table, .skill-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .student-table th, .student-table td, .skill-table th, .skill-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.486);
            text-align: left;
        }
        .present-btn, .absent-btn {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            margin: 0 4px;
        }
        .mark-input {
            width: 80px;
            background: rgba(255,255,255,0.3);
        }
        .payment-month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
        .month-option {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            text-align: center;
            border-radius: 28px;
            cursor: pointer;
            transition: 0.2s;
        }
        .month-option.paid {
            background: #2ecc71;
            opacity: 0.6;
            cursor: not-allowed;
        }
        .month-option.selected {
            background: #12f35d;
            transform: scale(1.02);
        }
        .loader-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: white;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c503c;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 2100;
            backdrop-filter: blur(8px);
        }
        .flex-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        @media (max-width: 700px) {
            .admin-card { width: 140px; padding: 12px; }
            .modal-content { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="loader-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="font-size: 24px; font-weight: bold;">Admin Dashboard loading...</div>
    <div>Syncing with Google Sheets...</div>
</div>

<div class="main-container">
    <h1><i class="fas fa-chalkboard-user"></i> Admin - English Class</h1>
    <div class="section-grid">
        <div class="admin-card" data-section="register"><i class="fas fa-user-plus"></i><br>Registration</div>
        <div class="admin-card" data-section="update"><i class="fas fa-edit"></i><br>Update Student Data</div>
        <div class="admin-card" data-section="attend"><i class="fas fa-calendar-check"></i><br>Attend Mark</div>
        <div class="admin-card" data-section="exam"><i class="fas fa-chart-line"></i><br>Exam Marks Entry</div>
        <div class="admin-card" data-section="skill"><i class="fas fa-language"></i><br>Skill Update</div>
        <div class="admin-card" data-section="payment"><i class="fas fa-coins"></i><br>Payment Mark</div>
    </div>
</div>

<div id="dynamicModal" class="modal"><div id="modalInner"></div></div>

<script>
    // ==================== GOOGLE SHEETS CONFIGURATION ====================
    // !!! IMPORTANT: Replace with your Google Apps Script Web App URL !!!
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXgn5HueVEIlKsD6UZZApZvZmpyAeqX9IGkV3697Wwcx5VfSwjwCtAK6JhyZSRhieM/exec";
    
    // Helper Functions
    function showLoader(show) {
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }
    
    function showToast(msg, isError = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.background = isError ? '#e67e22' : '#2ecc71';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Main API Call Function
    async function callGSheet(action, method = 'GET', payload = {}) {
        showLoader(true);
        try {
            const url = new URL(GOOGLE_SCRIPT_URL);
            if (method === 'GET') {
                url.searchParams.append('action', action);
                for (let [k, v] of Object.entries(payload)) {
                    if (v !== undefined && v !== null) url.searchParams.append(k, v);
                }
                const resp = await fetch(url.toString());
                const data = await resp.json();
                showLoader(false);
                return data;
            } else {
                const formData = new URLSearchParams();
                formData.append('action', action);
                formData.append('data', JSON.stringify(payload));
                
                const resp = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                const data = await resp.json();
                showLoader(false);
                return data;
            }
        } catch (err) {
            showLoader(false);
            console.error("API Error:", err);
            showToast("Network error: " + err.message, true);
            return { error: true, message: err.message };
        }
    }
    
    // ==================== API FUNCTIONS (Google Sheets) ====================
    
    async function registerStudent(data) {
        const result = await callGSheet('registerStudent', 'POST', data);
        if (result.success) {
            showToast("Student registered successfully!");
            return true;
        } else {
            showToast(result.error || "Registration failed!", true);
            return false;
        }
    }
    
    async function updateStudent(id, updatedData) {
        const payload = { id, ...updatedData };
        const result = await callGSheet('updateStudent', 'POST', payload);
        if (result.success) {
            showToast("Student data updated!");
            return true;
        } else {
            showToast(result.error || "Update failed!", true);
            return false;
        }
    }
    
    async function deleteStudent(id) {
        const result = await callGSheet('deleteStudent', 'POST', { id });
        if (result.success) {
            showToast("Student deleted successfully!");
            return true;
        } else {
            showToast(result.error || "Delete failed!", true);
            return false;
        }
    }
    
    async function getStudentsByGrade(grade) {
        const result = await callGSheet('getAllStudentsByGrade', 'GET', { grade });
        if (result.success && result.data) {
            return result.data;
        }
        return [];
    }
    
    async function saveAttendance(grade, date, records) {
        const result = await callGSheet('saveAttendance', 'POST', { grade, date, records });
        if (result.success) {
            showToast("Attendance saved to Google Sheets!");
            return true;
        } else {
            showToast(result.error || "Attendance save failed!", true);
            return false;
        }
    }
    
    async function saveExamMarks(grade, date, marks) {
        const result = await callGSheet('saveExamMarks', 'POST', { grade, date, marks });
        if (result.success) {
            showToast("Exam marks saved to Google Sheets!");
            return true;
        } else {
            showToast(result.error || "Exam marks save failed!", true);
            return false;
        }
    }
    
    async function saveSkill(data) {
        const result = await callGSheet('saveSkill', 'POST', data);
        if (result.success) {
            showToast("Skill updated successfully!");
            return true;
        } else {
            showToast(result.error || "Skill update failed!", true);
            return false;
        }
    }
    
    async function savePayment(id, month, year) {
        const payload = { id, month, year, timestamp: new Date().toISOString() };
        const result = await callGSheet('savePayment', 'POST', payload);
        if (result.success) {
            showToast(`Payment for ${month} ${year} recorded!`);
            return true;
        } else {
            showToast(result.error || "Payment failed!", true);
            return false;
        }
    }
    
    async function getPaidMonthsForStudent(studentId) {
        const result = await callGSheet('getPayments', 'GET', { id: studentId });
        if (result.success && result.data) {
            return result.data.map(p => p.month);
        }
        return [];
    }
    
    async function promoteAllGrades() {
        const result = await callGSheet('promoteGrades', 'POST', {});
        if (result.success) {
            showToast("All students promoted to next grade!");
            return true;
        } else {
            showToast(result.error || "Promotion failed!", true);
            return false;
        }
    }
    
    async function getStudentById(id) {
        const result = await callGSheet('getStudentData', 'GET', { id });
        if (result.success && result.data) {
            return result.data;
        }
        return null;
    }
    
    // ==================== UI RENDERING FUNCTIONS ====================
    
    const modalDiv = document.getElementById('dynamicModal');
    
    function openModal(htmlContent, closeCallback) {
        document.getElementById('modalInner').innerHTML = htmlContent;
        modalDiv.style.display = 'flex';
        const closeBtns = document.querySelectorAll('.close-modal');
        closeBtns.forEach(btn => btn.addEventListener('click', () => { 
            modalDiv.style.display = 'none'; 
            if(closeCallback) closeCallback(); 
        }));
    }
    
    function generateFormFields(data = {}) {
        const fields = ['id', 'password', 'name', 'grade', 'phone', 'gender', 'address', 'parentInf', 'birth'];
        return fields.map(field => `
            <div class="form-group">
                <label>${field.replace(/([A-Z])/g, ' $1').toUpperCase()}</label>
                <input name="${field}" value="${data[field] || ''}" placeholder="${field}" ${field === 'id' && data.id ? 'readonly' : ''}>
            </div>
        `).join('');
    }
    
    // Modal Functions
    function showRegisterUI() {
        openModal(`
            <div class="modal-content">
                <div class="modal-header">
                    <h2><i class="fas fa-user-graduate"></i> Student Registration</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <form id="regForm">
                    ${generateFormFields()}
                    <div class="flex-row">
                        <button type="submit">Register Student</button>
                        <button type="button" class="close-modal danger">Cancel</button>
                    </div>
                </form>
            </div>
        `);
        document.getElementById('regForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            let formData = new FormData(e.target);
            let student = {};
            for (let [k, v] of formData.entries()) student[k] = v;
            await registerStudent(student);
            modalDiv.style.display = 'none';
        });
    }
    
    function showUpdateUI() {
        openModal(`
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Update/Delete Student</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="form-group">
                    <label>Enter Student ID</label>
                    <input type="text" id="updateStudentId" placeholder="e.g., S001">
                </div>
                <button id="fetchStudentBtn">Fetch Student Data</button>
                <div id="updateFormContainer"></div>
                <div class="flex-row" style="margin-top: 20px;">
                    <button id="promoteGradesBtn" style="background:#f39c12;">Promote All Grades (Yearly)</button>
                </div>
            </div>
        `);
        
        document.getElementById('fetchStudentBtn').addEventListener('click', async () => {
            let id = document.getElementById('updateStudentId').value;
            if (!id) {
                showToast("Please enter Student ID", true);
                return;
            }
            let student = await getStudentById(id);
            if (!student) {
                showToast("Student ID not found in Google Sheets!", true);
                return;
            }
            let formHtml = `
                <form id="updateForm">
                    ${generateFormFields(student)}
                    <div class="flex-row">
                        <button type="submit">Update Student</button>
                        <button type="button" id="deleteStudentBtn" class="delete-btn">Delete Student</button>
                    </div>
                </form>
            `;
            document.getElementById('updateFormContainer').innerHTML = formHtml;
            
            document.getElementById('updateForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                let fd = new FormData(e.target);
                let upd = {};
                for (let [k, v] of fd.entries()) upd[k] = v;
                await updateStudent(id, upd);
                modalDiv.style.display = 'none';
            });
            
            document.getElementById('deleteStudentBtn')?.addEventListener('click', async () => {
                if (confirm("Are you sure you want to delete this student permanently?")) {
                    await deleteStudent(id);
                    modalDiv.style.display = 'none';
                }
            });
        });
        
        document.getElementById('promoteGradesBtn')?.addEventListener('click', async () => {
            await promoteAllGrades();
            modalDiv.style.display = 'none';
        });
    }
    
    function renderGradeCards(callback) {
        let grades = Array.from({ length: 13 }, (_, i) => i + 1);
        let html = `
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Select Grade</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="grade-cards">
                    ${grades.map(g => `<div class="grade-chip" data-grade="${g}">Grade ${g}</div>`).join('')}
                </div>
                <div id="gradeDetailArea"></div>
            </div>
        `;
        openModal(html);
        document.querySelectorAll('.grade-chip').forEach(chip => {
            chip.addEventListener('click', () => callback(chip.dataset.grade));
        });
    }
    
    async function showAttendUI() {
        renderGradeCards(async (grade) => {
            let students = await getStudentsByGrade(grade);
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange;">No students found in Grade ${grade}</p>`;
                return;
            }
            let today = new Date().toISOString().slice(0, 10);
            let tableRows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>
                        <button class="present-btn" data-id="${s.id}" data-status="Present">Present</button>
                        <button class="absent-btn" data-id="${s.id}" data-status="Absent">Absent</button>
                    </td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3>Grade ${grade} Attendance - ${today}</h3>
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Mark Attendance</th></tr>
                        ${tableRows}
                    </table>
                    <button id="saveAttendBtn">Save Attendance to Google Sheets</button>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            let attendanceMap = {};
            document.querySelectorAll('.present-btn, .absent-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let id = btn.dataset.id;
                    let status = btn.dataset.status;
                    attendanceMap[id] = status;
                    showToast(`Marked ${status} for ${id}`);
                });
            });
            
            document.getElementById('saveAttendBtn')?.addEventListener('click', async () => {
                let records = Object.entries(attendanceMap).map(([id, status]) => ({ id, status }));
                if (records.length === 0) {
                    showToast("No attendance marked!", true);
                    return;
                }
                await saveAttendance(grade, today, records);
                modalDiv.style.display = 'none';
            });
        });
    }
    
    async function showExamUI() {
        renderGradeCards(async (grade) => {
            let students = await getStudentsByGrade(grade);
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange;">No students found in Grade ${grade}</p>`;
                return;
            }
            let examDate = prompt("Enter exam date (YYYY-MM-DD):", new Date().toISOString().slice(0, 10)) || new Date().toISOString().slice(0, 10);
            let rows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td><input type="number" class="mark-input" data-id="${s.id}" placeholder="Mark (0-100)"></td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3>Exam Marks - Grade ${grade} (${examDate})</h3>
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Mark (0-100)</th></tr>
                        ${rows}
                    </table>
                    <button id="saveExamBtn">Save Marks to Google Sheets</button>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            document.getElementById('saveExamBtn')?.addEventListener('click', async () => {
                let marks = [];
                document.querySelectorAll('.mark-input').forEach(inp => {
                    let id = inp.dataset.id;
                    let mark = inp.value;
                    if (mark !== '' && !isNaN(mark)) {
                        marks.push({ id, mark: parseInt(mark) });
                    }
                });
                if (marks.length === 0) {
                    showToast("No marks entered!", true);
                    return;
                }
                await saveExamMarks(grade, examDate, marks);
                modalDiv.style.display = 'none';
            });
        });
    }
    
    async function showSkillUI() {
        renderGradeCards(async (grade) => {
            let students = await getStudentsByGrade(grade);
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange;">No students found in Grade ${grade}</p>`;
                return;
            }
            let rows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td><input class="skill-grammar" data-id="${s.id}" placeholder="Grammar (0-100)"></td>
                    <td><input class="skill-writing" data-id="${s.id}" placeholder="Writing (0-100)"></td>
                    <td><input class="skill-reading" data-id="${s.id}" placeholder="Reading (0-100)"></td>
                    <td><input class="skill-spoken" data-id="${s.id}" placeholder="Spoken (0-100)"></td>
                    <td><button class="saveSkillBtn" data-id="${s.id}">Save Skill</button></td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3>Skill Update - Grade ${grade}</h3>
                    <table class="skill-table">
                        <tr><th>ID</th><th>Name</th><th>Grammar</th><th>Writing</th><th>Reading</th><th>Spoken</th><th>Action</th></tr>
                        ${rows}
                    </table>
                    <button class="close-modal">Close</button>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            document.querySelectorAll('.saveSkillBtn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    let id = btn.dataset.id;
                    let grammar = document.querySelector(`.skill-grammar[data-id="${id}"]`).value;
                    let writing = document.querySelector(`.skill-writing[data-id="${id}"]`).value;
                    let reading = document.querySelector(`.skill-reading[data-id="${id}"]`).value;
                    let spoken = document.querySelector(`.skill-spoken[data-id="${id}"]`).value;
                    await saveSkill({ id, grammar, writing, reading, spoken });
                    showToast(`Skills saved for ${id}`);
                });
            });
        });
    }
    
    async function showPaymentUI() {
        renderGradeCards(async (grade) => {
            let students = await getStudentsByGrade(grade);
            if (students.length === 0) {
                document.getElementById('gradeDetailArea').innerHTML = `<p style="color:orange;">No students found in Grade ${grade}</p>`;
                return;
            }
            let rows = students.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td><button class="payBtn" data-id="${s.id}" data-name="${s.name}">Mark Payment</button></td>
                </tr>
            `).join('');
            let html = `
                <div>
                    <h3>Payments - Grade ${grade}</h3>
                    <table class="student-table">
                        <tr><th>ID</th><th>Name</th><th>Action</th></tr>
                        ${rows}
                    </table>
                    <button class="close-modal">Close</button>
                </div>
            `;
            document.getElementById('gradeDetailArea').innerHTML = html;
            
            document.querySelectorAll('.payBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    let sid = btn.dataset.id;
                    let paidMonths = await getPaidMonthsForStudent(sid);
                    let months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    let currentYear = new Date().getFullYear();
                    let monthGrid = `
                        <div class="payment-month-grid">
                            ${months.map(m => `<div class="month-option ${paidMonths.includes(m) ? 'paid' : ''}" data-month="${m}">${m}</div>`).join('')}
                        </div>
                        <button id="confirmPayment">Confirm Payment</button>
                    `;
                    
                    openModal(`
                        <div class="modal-content">
                            <h3>Select Month for ${sid}</h3>
                            ${monthGrid}
                            <button class="close-modal">Cancel</button>
                        </div>
                    `);
                    
                    let selected = null;
                    document.querySelectorAll('.month-option').forEach(opt => {
                        if (!opt.classList.contains('paid')) {
                            opt.addEventListener('click', () => {
                                selected = opt.dataset.month;
                                document.querySelectorAll('.month-option').forEach(o => o.classList.remove('selected'));
                                opt.classList.add('selected');
                            });
                        }
                    });
                    
                    document.getElementById('confirmPayment')?.addEventListener('click', async () => {
                        if (selected && !paidMonths.includes(selected)) {
                            await savePayment(sid, selected, currentYear);
                            modalDiv.style.display = 'none';
                        } else {
                            showToast("Invalid month or already paid!", true);
                        }
                    });
                });
            });
        });
    }
    
    // Event Listeners for Menu Cards
    document.querySelectorAll('.admin-card').forEach(card => {
        card.addEventListener('click', () => {
            const section = card.dataset.section;
            if (section === 'register') showRegisterUI();
            else if (section === 'update') showUpdateUI();
            else if (section === 'attend') showAttendUI();
            else if (section === 'exam') showExamUI();
            else if (section === 'skill') showSkillUI();
            else if (section === 'payment') showPaymentUI();
        });
    });
    
    console.log("✅ Admin Panel Ready - Connected to Google Sheets!");
</script>
</body>
</html>
